{% extends "base.html" %}
{% block content %}

<h3>Edit Task</h3>

<form method="POST">
    <input name="title" value="{{ task.title }}" class="form-control mb-2">
    <input name="description" value="{{ task.description }}" class="form-control mb-2">
    <input name="due_date" type="date" value="{{ task.due_date }}" class="form-control mb-2">

    <select name="priority" class="form-control mb-2">
        <option {% if task.priority=="Low" %}selected{% endif %}>Low</option>
        <option {% if task.priority=="Medium" %}selected{% endif %}>Medium</option>
        <option {% if task.priority=="High" %}selected{% endif %}>High</option>
    </select>

    <button class="btn btn-success">Update</button>
</form>

{% endblock %}
